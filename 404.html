<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#003F87" />
  <meta name="robots" content="noindex" />
  <title>Pagina non trovata · Damiano Coccioli</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23003F87'/><text x='32' y='44' font-family='Arial Black,Impact,sans-serif' font-size='34' font-weight='900' fill='%23F2C200' text-anchor='middle' letter-spacing='-1'>DC</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=Inter:wght@400;600;700&family=Archivo+Black&display=swap" />
  <style>
    :root { --c-azzurro-deep: #003F87; --c-azzurro-night: #001E45; --c-oro: #F2C200; --f-serif: "Fraunces", Georgia, serif; --f-sans: "Inter", system-ui, sans-serif; --f-display: "Archivo Black", sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; min-height: 100dvh; font-family: var(--f-sans); display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--c-azzurro-night), var(--c-azzurro-deep)); color: white; padding: 24px; }
    .container { text-align: center; max-width: 560px; }
    .four { font-family: var(--f-display); font-size: clamp(120px, 30vw, 220px); color: var(--c-oro); line-height: 0.8; letter-spacing: -0.05em; margin-bottom: 24px; opacity: 0.95; }
    h1 { font-family: var(--f-serif); font-style: italic; font-size: clamp(28px, 4vw, 44px); margin: 0 0 16px; color: white; line-height: 1.1; }
    p { font-size: 18px; color: rgba(255,255,255,0.85); margin: 0 0 32px; line-height: 1.55; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 999px; font-weight: 600; font-size: 16px; text-decoration: none; background: var(--c-oro); color: var(--c-azzurro-night); }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="four">404</div>
    <h1>Questa pagina è introvabile.</h1>
    <p>Forse l'URL è cambiato, o non è mai esistito. Nessun problema — qui sotto trovi la via di casa.</p>
    <a href="./" class="btn">← Torna alla home</a>
  </div>
</body>
</html>
